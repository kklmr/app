apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streaming
  template:
    metadata:
      labels:
        app: streaming
    spec:
      containers:
      - name: streaming-container
        image: streaming-service:v26
        imagePullPolicy: IfNotPresent
        env:
        - name: MINIO_ENDPOINT
          value: "minio-service:9000" # Имя сервиса MinIO внутри K8s
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: streaming-service
spec:
  selector:
    app: streaming
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30964
  type: LoadBalancer
